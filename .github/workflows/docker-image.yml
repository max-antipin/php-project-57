name: Docker Image CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  IMAGE_NAME: hexlet-php-project-57

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Build the Docker image
        run: |
          docker build . \
            --target prod \
            --tag "${IMAGE_NAME}:prod-$(date +%s)" \
            --tag "${IMAGE_NAME}:latest"
